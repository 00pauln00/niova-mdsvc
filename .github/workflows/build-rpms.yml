name: Build and Release RPMs

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-rpms:
    name: Build RPMs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Set Version
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            # Extract version from tag (e.g., v1.1.0 -> 1.1.0)
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            # Proper version for main branch
            echo "VERSION=1.1.0" >> $GITHUB_ENV
          else
            # For other pushes, use commit hash (prefixed to be a valid RPM version)
            echo "VERSION=0.0.0-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Build RPMs
        run: |
          bash docker-build/build.sh --build-deps
        env:
          VERSION: ${{ env.VERSION }}

      - name: Verify RPMs
        run: |
          bash docker-build/verify.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: niova-rpms-${{ matrix.arch }}-${{ env.VERSION }}
          path: docker-build/rpms/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.arch == 'x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: docker-build/rpms/*.rpm
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Update Release (aarch64)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.arch == 'aarch64'
        uses: softprops/action-gh-release@v2
        with:
          files: docker-build/rpms/*.rpm
          tag_name: ${{ github.ref_name }}
          append_body: true
