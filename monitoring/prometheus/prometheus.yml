global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: niova-controlplane
    static_configs:
      # One entry per cluster node. Each node runs one proxy on port 9701 (-mp flag).
      # Set `node` to the node's hostname or IP for display in Grafana.
      - targets:
          - localhost:9701
        labels:
          node: node-0
      # Add one block per additional node:
      # - targets:
      #     - 192.168.1.11:9701
      #   labels:
      #     node: node-1